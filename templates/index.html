<!DOCTYPE html>
<html>
<head>
    <title>Shraddha S K - Resume Parser</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-image: url("/static/cyber-bg.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            text-shadow: 0 0 10px rgba(0, 200, 255, 0.7);
        }

        .wrapper {
            margin-top: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card {
            background: rgba(255,255,255,0.9);
            padding: 40px;
            border-radius: 20px;
            width: 420px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input[type="file"] {
            margin-top: 5px;
            margin-bottom: 15px;
        }

        button {
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            border: none;
            padding: 12px 25px;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .results {
            margin-top: 40px;
            width: 80%;
            max-width: 900px;
        }

        .result-card {
            background: rgba(255,255,255,0.95);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            max-height: 250px;
            overflow-y: auto;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .result-title {
            color: white;
            margin-bottom: 10px;
            font-weight: bold;
        }

    </style>
</head>

<body>

<div class="navbar">
    Shraddha S K
</div>

<div class="wrapper">

    <!-- Upload Card -->
    <div class="card">
        <h2>Upload Resume & Job Description</h2>

        <form action="/upload">
            <label>Upload Resume</label>
            <input type="file" name="resume" accept=".pdf,.docx,.txt" required>

            <label>Upload Job Description</label>
            <input type="file" name="jobdesc" accept=".pdf,.docx,.txt" required>

            <button type="submit">Submit</button>
        </form>
    </div>

    {% if resume_text %}
    <div class="results">

        <div class="result-title">Resume Text</div>
        <div class="result-card">
            {{ resume_text }}
        </div>

        <div class="result-title">Job Description Text</div>
        <div class="result-card">
            {{ jobdesc_text }}
        </div>

    </div>
    {% endif %}

</div>

</body>
</html>
