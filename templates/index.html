<!DOCTYPE html>
<html>
<head>
    <title>Shraddha S K - Resume Parser</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-image: url("/static/cyber-bg.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            text-shadow: 0 0 10px rgba(0, 200, 255, 0.7);
        }

        .main {
            margin-top: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background: rgba(255,255,255,0.9);
            padding: 40px;
            border-radius: 20px;
            width: 400px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        h2 {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input[type="file"] {
            margin-top: 5px;
            margin-bottom: 15px;
        }

        button {
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            border: none;
            padding: 12px 25px;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .result-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 80%;
            max-width: 800px;
            margin-top: 20px;
            max-height: 250px;
            overflow-y: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        .result-title {
            color: white;
            margin-top: 30px;
        }

    </style>
</head>

<body>

<div class="navbar">
    Shraddha S K
</div>

<div class="main">

    <div class="container">
        <h2>Upload Resume & Job Description</h2>

        <form method="POST" enctype="multipart/form-data">
            <label>Upload Resume</label>
            <input type="file" name="resume" accept=".pdf,.docx,.txt" required>

            <label>Upload Job Description</label>
            <input type="file" name="jobdesc" accept=".pdf,.docx,.txt" required>

            <button type="submit">Submit</button>
        </form>
    </div>

    {% if resume_text %}

        <h3 class="result-title">Resume Text</h3>
        <div class="result-box">
            {{ resume_text }}
        </div>

        <h3 class="result-title">Job Description Text</h3>
        <div class="result-box">
            {{ jobdesc_text }}
        </div>

    {% endif %}

</div>

</body>
</html>
