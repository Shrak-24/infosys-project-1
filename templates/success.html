<!DOCTYPE html>
<html>
<head>
    <title>Upload Success</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #d6f0ff, #e8f7ff);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 25px rgba(0,0,0,0.2);
            width: 350px;
        }

        h2 {
            color: #0072ff;
        }

        a {
            text-decoration: none;
            background: #0072ff;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            display: inline-block;
            margin-top: 20px;
        }

        a:hover {
            background: #005ac7;
        }

    </style>
</head>

<body>

<div class="box">
    <h2>Files Uploaded Successfully ✅</h2>
    <a href="/">Go Back</a>
</div>

</body>
</html>
